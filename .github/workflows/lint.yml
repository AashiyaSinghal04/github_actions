# the linter will check if syntax is correct or not
name : Auto linter

on: 
  push:
    paths: "*.py"

jobs:
  code:
    runs-on: ubuntu-latest
    steps:
      - name: checkout/clone the code
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name : Install linter
        run : pip install ruff

      - name : run linter
        run : ruff check .
        
      
